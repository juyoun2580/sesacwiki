<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새싹위키 — 새싹트리</title>
  <!-- ================================================= -->
  <!-- COMMON STYLESHEETS — 공통 담당자 전용 (feature/core)   -->
  <!-- 새 CSS 파일 추가/순서 변경은 공통 담당자에게 요청       -->
  <!-- ================================================= -->
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <!-- 페이지 전용 CSS — Wiki 담당 소유 (docs/PAGES.md 참고) -->
  <link rel="stylesheet" href="assets/css/pages/wiki.css">
</head>

<body>
  <a class="skip-link" href="#main-content">본문 바로가기</a>

  <!-- ================================================= -->
  <!-- COMMON HEADER — 절대 수정하지 않는다                  -->
  <!-- 담당 : feature/core (공통 담당자 전용)                -->
  <!-- 변경이 필요하면 공통 담당자에게 요청한다                -->
  <!-- ================================================= -->
  <header class="header">
    <a href="index.html" class="header__logo" aria-label="새싹Wiki 홈">
      <img src="./assets/img/logo.svg" alt="새싹Wiki">
    </a>
    <div class="header__right">
      <button type="button" class="hamburger-btn" aria-label="메뉴 열기" aria-controls="side-panel" aria-expanded="false">
        <span class="hamburger-btn__bar"></span>
        <span class="hamburger-btn__bar"></span>
        <span class="hamburger-btn__bar"></span>
      </button>
      <div class="search-box">
        <span class="search-box__icon" aria-hidden="true">🔍</span>
        <label class="sr-only" for="global-search">검색</label>
        <input type="text" id="global-search" class="search-box__input" placeholder="궁금한 내용을 검색해보세요!">
      </div>
      <button type="button" class="notification-btn" aria-label="알림">
        🔔<span class="notification-btn__dot"></span>
      </button>
      <p class="point-badge"><span class="point-badge__icon" aria-hidden="true">🪙</span>0P</p>
      <button type="button" class="btn btn--outline btn--sm auth-guest-only">로그인</button>
      <div class="user-menu auth-user-only">
        <button type="button" class="user-chip" aria-haspopup="true" aria-expanded="false"
          aria-controls="user-menu-dropdown">
          <span class="avatar" aria-hidden="true">🌱</span>
          <span>
            <span class="user-chip__name">김새싹</span>
            <span class="user-chip__level">Lv.1 잎새</span>
          </span>
        </button>
        <div id="user-menu-dropdown" class="user-menu__dropdown" role="menu">
          <a href="mypage.html" class="user-menu__item" role="menuitem">마이페이지</a>
          <button type="button" class="user-menu__item" role="menuitem">로그아웃</button>
        </div>
      </div>
    </div>
  </header>
  <!-- COMMON HEADER END -->

  <!-- ================================================= -->
  <!-- COMMON NAVIGATION — 절대 수정하지 않는다              -->
  <!-- 담당 : feature/core (공통 담당자 전용)                -->
  <!-- 새 메뉴 추가는 공통 담당자에게 요청 (docs/DECISION_TREE.md 2번) -->
  <!-- MPA 전환: data-goto 기반 SPA 라우팅 대신 일반 <a href> 링크 사용 -->
  <!-- ================================================= -->
  <nav class="nav" aria-label="주 메뉴">
    <a class="nav__item" href="index.html">🏠 홈</a>
    <a class="nav__item nav__item--active" href="wiki.html" aria-current="page">📖 새싹위키</a>
    <a class="nav__item" href="exam.html">📝 모의고사</a>
    <a class="nav__item" href="job.html">💼 취업핸드북</a>
    <a class="nav__item" href="my.html">📚 마이핸드북</a>
  </nav>
  <!-- COMMON NAVIGATION END -->

  <!-- FOOTER: 현재 프로젝트에 footer 요소가 없다. 필요해지면 공통 담당자가 추가한다. -->

  <main id="main-content">
    <!-- ================================================= -->
    <!-- WIKI LIST PAGE -->
    <!-- 담당 : feature/wiki -->
    <!-- css : wiki.css -->
    <!-- js : pages/wiki.js (목록 렌더링/검색/정렬/페이지네이션), ui.js (즐겨찾기/사이드바 토글), toast.js -->
    <!-- json : wiki-data.json -->
    <!-- ================================================= -->
    <!-- WIKI START -->
    <section id="wiki" class="page page--active" aria-label="새싹위키">
      <div class="shell">
        <aside class="sidebar" aria-label="카테고리">
          <p class="sidebar__label">카테고리</p>
          <button type="button" class="sidebar__item sidebar__item--active" data-category="전체"><span
              class="sidebar__item-icon" aria-hidden="true">📋</span>전체</button>
          <button type="button" class="sidebar__item" data-category="Salesforce"><span class="sidebar__item-icon"
              aria-hidden="true">☁️</span>Salesforce</button>
          <button type="button" class="sidebar__item" data-category="Git"><span class="sidebar__item-icon"
              aria-hidden="true">🔀</span>Git/Vibecoding</button>
          <button type="button" class="sidebar__item" data-category="SQL"><span class="sidebar__item-icon"
              aria-hidden="true">🗄️</span>SQL</button>
          <button type="button" class="sidebar__item" data-category="Java"><span class="sidebar__item-icon"
              aria-hidden="true">☕</span>Java</button>
          <button type="button" class="sidebar__item" data-category="HTML/CSS"><span class="sidebar__item-icon"
              aria-hidden="true">🌐</span>HTML/CSS</button>
          <button type="button" class="sidebar__item" data-category="JavaScript"><span class="sidebar__item-icon"
              aria-hidden="true">⚡</span>JavaScript</button>
        </aside>
        <div class="page__content">
          <h1 class="page-title">새싹위키 🌱</h1>
          <p class="page-subtitle">새싹 과정에 필요한 모든 지식을 모아놓은 백과사전</p>

          <div class="wiki-toolbar">
            <label class="sr-only" for="wiki-search">위키 검색하기</label>
            <input type="text" id="wiki-search" class="wiki-toolbar__input" placeholder="위키 검색하기...">
            <div class="sort-pills">
              <button type="button" class="sort-pill sort-pill--active" data-sort="latest">최신순</button>
              <button type="button" class="sort-pill" data-sort="popular">인기순</button>
              <button type="button" class="sort-pill" data-sort="level">난이도순</button>
            </div>
          </div>

          <!-- assets/js/pages/wiki.js가 wiki-data.json을 읽어 이 안에 wiki-row를 렌더링한다 -->
          <ul class="wiki-row-list" id="wikiRowList"></ul>

          <nav class="pagination" id="wikiPagination" aria-label="페이지 네비게이션"></nav>
        </div>
        <aside class="side-panel" aria-label="많이 보는 위키">
          <p class="section-title section-title--sm">많이 보는 위키</p>
          <ol class="top-list" id="wikiTopList"></ol>
          <div class="tip-box">
            <p class="tip-box__title">💡 학습 팁</p>모르는 단어는 단어장에, 중요한 내용은 하이라이트로 나만의 핸드북을 만들어보세요!
            <p class="tip-box__icon" aria-hidden="true">🌿</p>
          </div>
        </aside>
      </div>
    </section>
    <!-- WIKI END -->
  </main>

  <!-- ================================================= -->
  <!-- COMMON SHARED MARKUP — 절대 수정하지 않는다 -->
  <!-- 담당 : feature/core (공통 담당자 전용) -->
  <!-- 이 페이지는 즐겨찾기 별 토글(ts())이 toast()를 호출하므로 -->
  <!-- 공용 Toast 인스턴스가 필요하다 -->
  <!-- ================================================= -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <!-- COMMON SHARED MARKUP END -->

  <!-- ================================================= -->
  <!-- COMMON SCRIPTS — 절대 수정하지 않는다 -->
  <!-- 담당 : feature/core (공통 담당자 전용) -->
  <!-- ================================================= -->
  <script src="assets/js/toast.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/ui.js" defer></script>
  <!-- 페이지 전용 스크립트 — Wiki 담당 소유. wiki-data.json 목록 렌더링을 위해 추가.
       WORK_ORDER.md 기준 <script> 태그 목록은 공통 담당자 소유 블록이라 이 한 줄 추가는
       PR에서 공통 담당자 확인이 필요하다. -->
  <script src="assets/js/pages/wiki.js" defer></script>
</body>

</html>
