<!DOCTYPE html>
<html lang="ko">

<head>

  <title>취업핸드북 — 새싹트리</title>
  <!-- ================================================= -->
  <!-- COMMON STYLESHEETS — 공통 담당자 전용 (feature/core)   -->

  <!-- ================================================= -->
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <!-- 페이지 전용 CSS — MyPage(Job/My) 담당 소유 (docs/PAGES.md 참고) -->
  <link rel="stylesheet" href="assets/css/pages/job.css">
</head>

<body>
  <a class="skip-link" href="#main-content">본문 바로가기</a>

  <!-- ================================================= -->
  <!-- COMMON HEADER — 절대 수정하지 않는다                  -->
  <!-- 담당 : feature/core (공통 담당자 전용)                -->
  <!-- 변경이 필요하면 공통 담당자에게 요청한다                -->
  <!-- ================================================= -->
  <header class="header">
    <div class="header__logo">
      <span class="header__logo-mark" aria-hidden="true">🌱</span>
      <div>
        <p class="header__logo-name">새싹트리</p>
        <p class="header__logo-sub">나만의 취업 핸드북</p>
      </div>
    </div>
    <div class="search-box">
      <span class="search-box__icon" aria-hidden="true">🔍</span>
      <label class="sr-only" for="global-search">검색</label>
      <input type="text" id="global-search" class="search-box__input" placeholder="궁금한 내용을 검색해보세요!">
    </div>
    <div class="header__right">
      <button type="button" class="notification-btn" aria-label="알림">🔔<span
          class="notification-btn__dot"></span></button>
      <p class="point-badge"><span class="point-badge__icon" aria-hidden="true">🪙</span>1,240P</p>
      <button type="button" class="user-chip">
        <span class="avatar" aria-hidden="true">🌿</span>
        <span>
          <span class="user-chip__name">김새싹</span>
          <span class="user-chip__level">Lv.3 잎새</span>
        </span>
        <span class="user-chip__caret" aria-hidden="true">▾</span>
      </button>
    </div>
  </header>
  <!-- COMMON HEADER END -->

  <!-- ================================================= -->
  <!-- COMMON NAVIGATION — 절대 수정하지 않는다              -->
  <!-- 담당 : feature/core (공통 담당자 전용)                -->
  <!-- 새 메뉴 추가는 공통 담당자에게 요청 (docs/DECISION_TREE.md 2번) -->
  <!-- MPA 전환: data-goto 기반 SPA 라우팅 대신 일반 <a href> 링크 사용 -->
  <!-- ================================================= -->
  <nav class="nav" aria-label="주 메뉴">
    <a class="nav__item" href="index.html">🏠 홈</a>
    <a class="nav__item" href="wiki.html">📖 새싹위키</a>
    <a class="nav__item" href="exam.html">📝 모의고사</a>
    <a class="nav__item nav__item--active" href="job.html" aria-current="page">💼 취업핸드북</a>
    <a class="nav__item" href="my.html">📚 마이핸드북</a>
  </nav>
  <!-- COMMON NAVIGATION END -->

  <!-- FOOTER: 현재 프로젝트에 footer 요소가 없다. 필요해지면 공통 담당자가 추가한다. -->

  <main id="main-content">
    <!-- ================================================= -->
    <!-- JOB HANDBOOK PAGE -->
    <!-- 담당 : feature/job -->
    <!-- css : job.css -->
    <!-- js : ui.js (사이드바 토글), app.js/toast.js (공통) -->
    <!-- json : job.json -->
    <!-- ================================================= -->
    <!-- JOB START -->
    <section id="job" class="page page--active" aria-label="취업핸드북">
      <div class="shell">
        <!-- job.js가 job.json으로 렌더링 -->
        <aside class="sidebar" id="job-sidebar" aria-label="취업핸드북 메뉴"></aside>
        <div class="page__content">
          <h1 class="page-title">취업핸드북 🌱</h1>
          <p class="page-subtitle">단계별로 차근차근 준비해서 꿈을 현실로 만들어보세요!</p>
          <nav class="job-stepper" id="job-stepper" aria-label="취업 준비 단계"></nav>
          <article class="job-card" id="job-card"></article>
        </div>
        <aside class="side-panel" id="job-side-panel" aria-label="취업 준비 현황 및 도구"></aside>
      </div>
    </section>
    <!-- JOB END -->
  </main>

  <!-- ================================================= -->
  <!-- COMMON SHARED MARKUP — 절대 수정하지 않는다 -->
  <!-- 담당 : feature/core (공통 담당자 전용) -->
  <!-- ================================================= -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <!-- COMMON SHARED MARKUP END -->

  <!-- ================================================= -->
  <!-- COMMON SCRIPTS — 절대 수정하지 않는다 -->
  <!-- 담당 : feature/core (공통 담당자 전용) -->

  <script src="assets/js/toast.js" defer></script>
  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/ui.js" defer></script>
  <!-- job.js — feature/job 담당. 공통 담당자(feature/core) 확인 요청 -->
  <script src="assets/js/pages/job.js" defer></script>

</html>
