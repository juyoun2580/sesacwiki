<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL SELECT 문법 — 새싹위키</title>
  <!-- ================================================= -->
  <!-- COMMON STYLESHEETS — 공통 담당자 전용 (feature/core)   -->
  <!-- 새 CSS 파일 추가/순서 변경은 공통 담당자에게 요청       -->
  <!-- ================================================= -->
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <!-- 페이지 전용 CSS — Wiki 담당 소유 (wiki 목록과 공유, docs/PAGES.md 참고) -->
  <link rel="stylesheet" href="assets/css/pages/wiki.css">
</head>

<body>
  <a class="skip-link" href="#main-content">본문 바로가기</a>

  <!-- ================================================= -->
  <!-- COMMON HEADER — 절대 수정하지 않는다                  -->
  <!-- 담당 : feature/core (공통 담당자 전용)                -->
  <!-- 변경이 필요하면 공통 담당자에게 요청한다                -->
  <!-- ================================================= -->
 <header class="header">
    <a href="index.html" class="header__logo" aria-label="새싹Wiki 홈">
      <img src="./assets/img/logo.svg" alt="새싹Wiki">
    </a>
    <div class="header__right">
      <button type="button" class="hamburger-btn" aria-label="메뉴 열기" aria-controls="side-panel" aria-expanded="false">
        <span class="hamburger-btn__bar"></span>
        <span class="hamburger-btn__bar"></span>
        <span class="hamburger-btn__bar"></span>
      </button>
      <div class="search-box">
        <span class="search-box__icon" aria-hidden="true">🔍</span>
        <label class="sr-only" for="global-search">검색</label>
        <input type="text" id="global-search" class="search-box__input" placeholder="궁금한 내용을 검색해보세요!">
      </div>
      <button type="button" class="notification-btn" aria-label="알림">
        🔔<span class="notification-btn__dot"></span>
      </button>
      <p class="point-badge"><span class="point-badge__icon" aria-hidden="true">🪙</span>0P</p>
      <button type="button" class="btn btn--outline btn--sm auth-guest-only">로그인</button>
      <div class="user-menu auth-user-only">
        <button type="button" class="user-chip" aria-haspopup="true" aria-expanded="false"
          aria-controls="user-menu-dropdown">
          <span class="avatar" aria-hidden="true">🌱</span>
          <span>
            <span class="user-chip__name">김새싹</span>
            <span class="user-chip__level">Lv.1 잎새</span>
          </span>
        </button>
        <div id="user-menu-dropdown" class="user-menu__dropdown" role="menu">
          <a href="mypage.html" class="user-menu__item" role="menuitem">마이페이지</a>
          <button type="button" class="user-menu__item" role="menuitem">로그아웃</button>
        </div>
      </div>
    </div>
  </header>
  <!-- COMMON HEADER END -->

  <!-- ================================================= -->
  <!-- COMMON NAVIGATION — 절대 수정하지 않는다              -->
  <!-- 담당 : feature/core (공통 담당자 전용)                -->
  <!-- 새 메뉴 추가는 공통 담당자에게 요청 (docs/DECISION_TREE.md 2번) -->
  <!-- MPA 전환: data-goto 기반 SPA 라우팅 대신 일반 <a href> 링크 사용 -->
  <!-- ================================================= -->
  <nav class="nav" aria-label="주 메뉴">
    <a class="nav__item" href="index.html">🏠 홈</a>
    <a class="nav__item nav__item--active" href="wiki.html" aria-current="page">📖 새싹위키</a>
    <a class="nav__item" href="exam.html">📝 모의고사</a>
    <a class="nav__item" href="job.html">💼 취업핸드북</a>
    <a class="nav__item" href="my.html">📚 마이핸드북</a>
  </nav>
  <!-- COMMON NAVIGATION END -->

  <!-- FOOTER: 현재 프로젝트에 footer 요소가 없다. 필요해지면 공통 담당자가 추가한다. -->

  <main id="main-content">
    <!-- ================================================= -->
    <!-- WIKI DETAIL PAGE (하이라이트 + 단어저장) -->
    <!-- 담당 : feature/wiki -->
    <!-- css : wiki.css -->
    <!-- js : pages/wiki.js (상세 렌더링/목차 스크롤/핸드북 저장 연동), highlight.js (전용), app.js/ui.js/toast.js/modal.js (공통) -->
    <!-- pages/mypage.js : 단어장 모달의 "단어장에 저장" 버튼을 mywords.html/mypage.html과 동일한 -->
    <!-- localStorage(sesac.mywords.list)에 실제로 적재하기 위해 추가 로드한다 (mywords.html과 동일 패턴) -->
    <!-- json : wiki-data.json -->
    <!-- ================================================= -->
    <!-- DETAIL START -->
    <section id="detail" class="page page--active" aria-label="위키 상세">
      <div class="shell">
        <div class="page__content">
          <a class="back-link" href="wiki.html">‹ 새싹위키 목록으로</a>
          <div class="detail-layout">
            <!-- TOC : assets/js/pages/wiki.js가 wiki-data.json content 섹션으로 채운다 -->
            <nav class="toc" id="wikiToc" aria-label="목차">
              <p class="toc__label">목차</p>
            </nav>
            <!-- Article -->
            <article class="wiki-detail__main">
              <div class="article-header">
                <h1 class="article-header__title" id="wikiDetailTitle"></h1>
                <span class="tag" id="wikiDetailCategoryTag"></span><span class="tag tag--gray"
                  id="wikiDetailLevelTag"></span>
              </div>
              <p class="article-meta">
                <span id="wikiDetailTime"></span>
                <span id="wikiDetailPercent"></span>
                <button type="button" class="article-meta__favorite favorite-star" id="wikiDetailFavorite"
                  aria-pressed="false">★ 즐겨찾기</button>
              </p>
              <div class="detail-progress progress-bar" role="progressbar" id="wikiDetailProgressBar"
                aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                <div class="progress-bar__fill progress-bar__fill--green" id="wikiDetailProgressFill"></div>
              </div>

              <p class="highlight-banner">
                <span aria-hidden="true">✏️</span>
                <span><strong>텍스트를 드래그</strong>하면 하이라이트 저장 또는 단어장 추가를 할 수 있어요!</span>
              </p>

              <!-- assets/js/pages/wiki.js가 wiki-data.json content 섹션으로 채운다 -->
              <div class="article" id="artbody"></div>

              <h2 class="related-heading">관련 문서</h2>
              <div id="wikiRelatedList"></div>
            </article>

            <!-- 위키 패널 -->
            <aside class="wiki-detail__aside" aria-label="핸드북 저장 도구">
              <div class="save-box">
                <p class="save-box__title">📚 내 핸드북에 저장</p>
                <button type="button" class="save-box__action" data-action="quick-favorite"><span
                    class="favorite-star" id="wikiDetailFavoriteMini" aria-hidden="true">★</span> 즐겨찾기</button>
                <button type="button" class="save-box__action" data-action="toast"
                  data-message="텍스트를 드래그하면 하이라이트 툴바가 나타나요!">✏️ 하이라이트</button>
                <button type="button" class="save-box__action" data-action="open-modal" data-word="">📓 단어장 추가</button>
              </div>
              <button type="button" class="complete-btn" id="wikiCompleteBtn" data-action="toast"
                data-message="🎉 학습 완료! +20P 획득했어요!">✅ 학습
                완료</button>
              <!-- 하이라이트 목록 -->
              <div class="highlight-list-wrap">
                <p class="highlight-list__label" id="hlcount">✏️ 저장한 하이라이트 (0)</p>
                <div class="highlight-list"></div>
              </div>
            </aside>
          </div>
        </div>
      </div>
    </section>
    <!-- DETAIL END -->
  </main>

  <!-- ================================================= -->
  <!-- COMMON SHARED MARKUP — 절대 수정하지 않는다 -->
  <!-- 담당 : feature/core (공통 담당자 전용) -->
  <!-- Toast / Highlight Toolbar / 단어 저장 Modal의 마크업은 -->
  <!-- 모든 페이지가 공유하는 단일 인스턴스다. 변경이 필요하면 -->
  <!-- 공통 담당자에게 요청한다 (docs/COMPONENTS.md 참고) -->
  <!-- ================================================= -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- 하이라이트 툴바 -->
  <div class="highlight-toolbar" id="hlbar" role="toolbar" aria-label="하이라이트 도구">
    <button type="button" class="highlight-toolbar__btn highlight-toolbar__btn--yellow" data-action="apply-highlight"
      data-color="y">🟡 노란색</button>
    <button type="button" class="highlight-toolbar__btn highlight-toolbar__btn--green" data-action="apply-highlight"
      data-color="g">🟢 초록색</button>
    <button type="button" class="highlight-toolbar__btn highlight-toolbar__btn--word" data-action="highlight-to-word">📓
      단어장</button>
  </div>

  <!-- 단어 저장 모달 -->
  <div class="modal-overlay" id="wmodal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="wmodal-title">
      <p class="modal__title" id="wmodal-title">📓 단어장에 추가</p>
      <div class="modal__field">
        <label class="modal__label" for="mword">단어</label>
        <input class="modal__input" id="mword" placeholder="단어를 입력하세요">
      </div>
      <div class="modal__field">
        <label class="modal__label" for="mmeaning">뜻 (한국어)</label>
        <input class="modal__input" id="mmeaning" placeholder="뜻을 입력하세요">
      </div>
      <div class="modal__field">
        <label class="modal__label" for="mcategory">카테고리</label>
        <select class="modal__input" id="mcategory">
          <option>SQL</option>
          <option>Java</option>
          <option>CS/IT</option>
          <option>비즈니스</option>
          <option>기타</option>
        </select>
      </div>
      <div class="modal__actions">
        <button type="button" class="btn btn--outline btn--sm" data-action="close-modal">취소</button>
        <button type="button" class="btn btn--primary btn--sm" data-action="save-word">단어장에 저장</button>
      </div>
    </div>
  </div>
  <!-- COMMON SHARED MARKUP END -->

  <!-- ================================================= -->
  <!-- COMMON SCRIPTS — 절대 수정하지 않는다 -->
  <!-- 담당 : feature/core (공통 담당자 전용) -->
  <!-- ================================================= -->
  <script src="assets/js/toast.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/ui.js" defer></script>
  <script src="assets/js/modal.js" defer></script>
  <!-- 페이지 전용 JS — Wiki 담당 소유 (docs/PAGES.md 참고) -->
  <!-- wiki.js 추가는 wiki.html과 동일하게 <script> 목록(공통 블록) 변경이라 PR에서 공통 담당자 확인 필요 -->
  <script src="assets/js/pages/wiki.js" defer></script>
  <script src="assets/js/pages/highlight.js" defer></script>
  <script src="assets/js/pages/mypage.js" defer></script>
</body>

</html>
