<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모의고사 — 새싹트리</title>
  <!-- ================================================= -->
  <!-- COMMON STYLESHEETS — 공통 담당자 전용 (feature/core)   -->
  <!-- 새 CSS 파일 추가/순서 변경은 공통 담당자에게 요청       -->
  <!-- ================================================= -->
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <!-- 페이지 전용 CSS — Exam 담당 소유 (docs/PAGES.md 참고) -->
  <link rel="stylesheet" href="assets/css/pages/exam.css">
</head>

<body>
  <a class="skip-link" href="#main-content">본문 바로가기</a>

  <!-- ================================================= -->
  <!-- COMMON HEADER — 절대 수정하지 않는다                  -->
  <!-- 담당 : feature/core (공통 담당자 전용)                -->
  <!-- 변경이 필요하면 공통 담당자에게 요청한다                -->
  <!-- ================================================= -->
 <header class="header">
    <a href="index.html" class="header__logo" aria-label="새싹Wiki 홈">
      <img src="./assets/img/logo.svg" alt="새싹Wiki">
    </a>
    <div class="header__right">
      <button type="button" class="hamburger-btn" aria-label="메뉴 열기" aria-controls="side-panel" aria-expanded="false">
        <span class="hamburger-btn__bar"></span>
        <span class="hamburger-btn__bar"></span>
        <span class="hamburger-btn__bar"></span>
      </button>
      <div class="search-box">
        <span class="search-box__icon" aria-hidden="true">🔍</span>
        <label class="sr-only" for="global-search">검색</label>
        <input type="text" id="global-search" class="search-box__input" placeholder="궁금한 내용을 검색해보세요!">
      </div>
      <button type="button" class="notification-btn" aria-label="알림">
        🔔<span class="notification-btn__dot"></span>
      </button>
      <p class="point-badge"><span class="point-badge__icon" aria-hidden="true">🪙</span>0P</p>
      <button type="button" class="btn btn--outline btn--sm auth-guest-only">로그인</button>
      <div class="user-menu auth-user-only">
        <button type="button" class="user-chip" aria-haspopup="true" aria-expanded="false"
          aria-controls="user-menu-dropdown">
          <span class="avatar" aria-hidden="true">🌱</span>
          <span>
            <span class="user-chip__name">김새싹</span>
            <span class="user-chip__level">Lv.1 잎새</span>
          </span>
        </button>
        <div id="user-menu-dropdown" class="user-menu__dropdown" role="menu">
          <a href="mypage.html" class="user-menu__item" role="menuitem">마이페이지</a>
          <button type="button" class="user-menu__item" role="menuitem">로그아웃</button>
        </div>
      </div>
    </div>
  </header>
  <!-- COMMON HEADER END -->

  <!-- ================================================= -->
  <!-- COMMON NAVIGATION — 절대 수정하지 않는다              -->
  <!-- 담당 : feature/core (공통 담당자 전용)                -->
  <!-- 새 메뉴 추가는 공통 담당자에게 요청 (docs/DECISION_TREE.md 2번) -->
  <!-- MPA 전환: data-goto 기반 SPA 라우팅 대신 일반 <a href> 링크 사용 -->
  <!-- ================================================= -->
  <nav class="nav" aria-label="주 메뉴">
    <a class="nav__item" href="index.html">🏠 홈</a>
    <a class="nav__item" href="wiki.html">📖 새싹위키</a>
    <a class="nav__item nav__item--active" href="exam.html" aria-current="page">📝 모의고사</a>
    <a class="nav__item" href="job.html">💼 취업핸드북</a>
    <a class="nav__item" href="my.html">📚 마이핸드북</a>
  </nav>
  <!-- COMMON NAVIGATION END -->

  <!-- FOOTER: 현재 프로젝트에 footer 요소가 없다. 필요해지면 공통 담당자가 추가한다. -->

  <main id="main-content">
    <!-- ================================================= -->
    <!-- EXAM LIST PAGE -->
    <!-- 담당 : feature/exam -->
    <!-- css : exam.css -->
    <!-- js : ui.js (필터탭 토글), app.js/toast.js (공통), pages/exam.js (side-panel 통계·오답노트, 전용) -->
    <!-- json : exam.json -->
    <!-- ================================================= -->
    <!-- EXAM START -->
    <section id="exam" class="page page--active" aria-label="모의고사">
      <div class="shell">
        <aside class="sidebar" aria-label="모의고사 카테고리">
          <p class="sidebar__label">모의고사</p>
          <button type="button" class="sidebar__item sidebar__item--active" data-category="전과목"><span
              class="sidebar__item-icon" aria-hidden="true">📋</span>전과목</button>
          <button type="button" class="sidebar__item" data-category="세일즈포스"><span class="sidebar__item-icon"
              aria-hidden="true">☁️</span>세일즈포스</button>
          <button type="button" class="sidebar__item" data-category="Java"><span class="sidebar__item-icon"
              aria-hidden="true">☕</span>Java</button>
          <button type="button" class="sidebar__item" data-category="SQL"><span class="sidebar__item-icon"
              aria-hidden="true">🗄️</span>SQL</button>
          <button type="button" class="sidebar__item" data-category="HTML"><span class="sidebar__item-icon"
              aria-hidden="true">🌐</span>HTML</button>
          <button type="button" class="sidebar__item" data-category="CSS"><span class="sidebar__item-icon"
              aria-hidden="true">🎨</span>CSS</button>
          <button type="button" class="sidebar__item" data-category="JavaScript"><span class="sidebar__item-icon"
              aria-hidden="true">⚡</span>JavaScript</button>
          <button type="button" class="sidebar__item" data-category="기타"><span class="sidebar__item-icon"
              aria-hidden="true">🔀</span>기타</button>
          <div class="exam-sidebar-card">
            <p class="exam-sidebar-card__title">꾸준히 풀면 실력이 쑥쑥!</p>오늘도 한 문제 도전해보세요 🌱
            <p class="exam-sidebar-card__emoji" aria-hidden="true">🌳</p>
          </div>
        </aside>
        <div class="page__content">
          <h1 class="page-title">모의고사 🌱</h1>
          <p class="page-subtitle">중간평가, 실습평가, 취업 대비 문제를 풀어보세요.</p>

          <div class="filter-tabs">
            <button type="button" class="filter-tab filter-tab--active" data-category="전과목">전과목</button>
            <button type="button" class="filter-tab" data-category="세일즈포스">세일즈포스</button>
            <button type="button" class="filter-tab" data-category="Java">Java</button>
            <button type="button" class="filter-tab" data-category="SQL">SQL</button>
            <button type="button" class="filter-tab" data-category="HTML">HTML</button>
            <button type="button" class="filter-tab" data-category="CSS">CSS</button>
            <button type="button" class="filter-tab" data-category="JavaScript">JavaScript</button>
            <button type="button" class="filter-tab" data-category="기타">기타</button>
          </div>

          <ul class="exam-row-list" id="exam-row-list"></ul>
        </div>
        <aside class="side-panel" aria-label="내 모의고사 현황">
          <div class="section-title">내 모의고사 현황</div>
          <div class="exam-status-ring-wrap">
            <div class="score-ring">
              <svg id="exam-score-ring-svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-label="전체 평균 0%">
                <defs>
                  <linearGradient id="exam-score-ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="var(--g500)" />
                    <stop offset="100%" stop-color="var(--g900)" />
                  </linearGradient>
                </defs>
                <circle class="score-ring__bg" cx="40" cy="40" r="30" stroke-width="7" />
                <circle id="exam-score-ring-fill" class="score-ring__fill" cx="40" cy="40" r="30"
                  stroke="url(#exam-score-ring-gradient)" stroke-width="7" stroke-dasharray="188"
                  stroke-dashoffset="188" transform="rotate(-90 40 40)" />
              </svg>
              <div class="score-ring__text"><span id="exam-score-ring-value" class="score-ring__value">0%</span><span
                  class="exam-status-ring-wrap__caption">전체 평균</span></div>
            </div>
          </div>
          <div class="exam-stat"><span class="exam-stat__label">🎯 응시한 시험</span><span id="exam-stat-attempt-count"
              class="exam-stat__value">-</span>
          </div>
          <div class="exam-stat"><span class="exam-stat__label">📊 평균 점수</span><span id="exam-stat-avg-score"
              class="exam-stat__value">-</span>
          </div>
          <div class="exam-stat"><span class="exam-stat__label">🏆 최고 점수</span><span id="exam-stat-best-score"
              class="exam-stat__value">-</span>
          </div>
          <div class="exam-stat"><span class="exam-stat__label">💰 획득 포인트</span><span id="exam-stat-earned-points"
              class="exam-stat__value">-</span>
          </div>

          <div class="section-title section-title--spaced">최근 응시한 시험 <button type="button" id="exam-recent-toggle"
              class="section-title__link">전체보기 ›</button></div>
          <div id="exam-recent-list">
            <!-- assets/js/pages/exam.js가 attemptHistory 기준으로 채운다 -->
          </div>

          <div class="wrong-note-box">
            <p class="wrong-note-box__title">📝 오답노트</p>
            <p class="wrong-note-box__desc">틀린 문제를 다시 풀고 약점을 보완해보세요! 문항을 눌러 5단 해설을 확인하세요.</p>
            <div class="wrong-note-list" id="exam-wrong-note-list">
              <!-- assets/js/pages/exam.js가 wrongNoteSamples 기준으로 아코디언을 채운다 -->
            </div>
          </div>
        </aside>
      </div>
    </section>
    <!-- EXAM END -->
  </main>

  <!-- ================================================= -->
  <!-- COMMON SHARED MARKUP — 절대 수정하지 않는다 -->
  <!-- 담당 : feature/core (공통 담당자 전용) -->
  <!-- ================================================= -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <!-- COMMON SHARED MARKUP END -->

  <!-- ================================================= -->
  <!-- COMMON SCRIPTS — 절대 수정하지 않는다 -->
  <!-- 담당 : feature/core (공통 담당자 전용) -->
  <!-- ================================================= -->
  <script src="assets/js/toast.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/ui.js" defer></script>
  <!-- 예외: 원래 공통 담당자 승인이 필요한 script 목록이지만, 이번 세션은 공통 담당자 역할을 겸하는
       사용자가 직접 승인하여 Exam 담당 소유 파일을 추가함 (99-EXAM_PLAN.md 9장 7번 항목) -->
  <script src="assets/js/pages/exam.js" defer></script>
</body>

</html>
